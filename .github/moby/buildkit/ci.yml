name: Production Go-Zig Integration Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Repository
      uses: actions/checkout@v4

    - name: Configure Go Development Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Configure Zig Compiler Engine
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.12.0

    - name: Download Go Module Dependencies
      run: go mod download

    - name: Execute Server Unit Test Matrix
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Cross-Compile Binary via Zig C-Linker
      run: |
        CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC="zig cc -target x86_64-linux" go build -ldflags="-w -s" -o release-server .

    - name: Upload Compiled Production Binary
      uses: actions/artifacts/upload-artifact@v4
      with:
        name: production-linux-binary
        path: release-server

